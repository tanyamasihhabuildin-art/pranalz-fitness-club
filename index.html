function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

  if(typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey){

/* ---------------- Firestore Database Access ---------------- */
function membersCol(){ return db.collection('members'); }
function settingsDoc(){ return db.collection('settings').doc('owner'); }

async function getOwnerPasscode(){
  try {
    const snap = await settingsDoc().get();
    return snap.exists ? (snap.data().passcode || null) : null;
  } catch(e) { return null; }
}

async function setOwnerPasscode(val){
  await settingsDoc().set({passcode: val});
}

// FIXED: Removed .select() which is not supported in Web SDK
function watchMembersList(cb){
  return membersCol()
    .orderBy('createdAt','desc')
    .onSnapshot(
      snap => cb(snap.docs.map(d => ({id:d.id, ...d.data()}))),
      err => { console.error('Dashboard sync error:', err); cb([]); }
    );
}

async function getMember(code){
  if(!code) return null;
  try {
    const snap = await membersCol().doc(code).get();
    return snap.exists ? {id:snap.id, ...snap.data()} : null;
  } catch(e) { return null; }
}

function watchMember(code, cb){
  return membersCol().doc(code).onSnapshot(
    snap => cb(snap.exists ? {id:snap.id, ...snap.data()} : null),
    err => { console.error('Member sync error:', err); cb(null); }
  );
}

async function saveMember(id, data){
  try {
    await membersCol().doc(id).set(data);
    return true;
  } catch(e) { return false; }
}

async function deleteMember(id){
  await membersCol().doc(id).delete();
}

async function updateMemberProgress(id, doneDays){
  await membersCol().doc(id).update({doneDays});
}

function detachListeners(){
  if(dashUnsub){ dashUnsub(); dashUnsub = null; }
  if(planUnsub){ planUnsub(); planUnsub = null; }
}

/* ---------------- Utility Functions ---------------- */
function esc(str){
  const d=document.createElement('div'); d.innerText = str==null?'':str; return d.innerHTML;
}

function linesToArr(text){
  return (text||'')
    .replace(/<br\s*\/?>/gi, '\n')
    .split('\n')
    .map(s=>s.trim())
    .filter(Boolean);
}

function expandBrLines(arr){
  return (arr||[]).flatMap(item =>
    String(item||'').split(/<br\s*\/?>/gi).map(s=>s.trim()).filter(Boolean)
  );
}

function exerciseSearchTerm(line){
  if(!line) return null;
  let t = line.trim();
  if(/^\d+\s*rounds?:?$/i.test(t)) return null;
  t = t.replace(/^finish:\s*/i,'');
  t = t.split(/[–-]/)[0].trim();
  t = t.replace(/^\d+\s+/,''); 
  if(!t || t.length<3) return null;
  return t;
}

function findExerciseVideo(term){
  if(!term) return null;
  const t = term.toLowerCase();
  for(const [key, id] of EXERCISE_VIDEO_MAP){
    if(t.includes(key)) return {id, url:'https://www.youtube.com/watch?v='+id};
  }
  return null;
}

function extractYouTubeId(url){
  if(!url) return null;
  try{
    const u = new URL(url);
    let id = null;
    if(u.hostname.includes('youtu.be')) id = u.pathname.slice(1);
    else if(u.hostname.includes('youtube.com')){
      if(u.pathname === '/watch') id = u.searchParams.get('v');
      else if(u.pathname.startsWith('/embed/')) id = u.pathname.split('/embed/')[1];
      else if(u.pathname.startsWith('/shorts/')) id = u.pathname.split('/shorts/')[1];
    }
    return id ? id.split('&')[0].split('?')[0] : null;
  }catch(e){ return null; }
}

function defaultExpiryDate(){
  const d = new Date(); d.setDate(d.getDate()+30);
  return d.toISOString().slice(0,10);
}

function isExpired(expiryDate){
  if(!expiryDate) return false;
  const today = new Date(); 
  today.setHours(0,0,0,0);
  const exp = new Date(expiryDate);
  exp.setHours(23,59,59,999);
  return today > exp;
}

      '💧 Drink 3–4 litres of water',
      '😴 Get 7–8 hours of sleep',
      '🚫 Avoid sugary drinks, junk food and fried items'
    ],
    phases:[
      {title:'Days 1–10 (Beginner)', dayStart:1, dayEnd:10, video:'', exercises:['March in place – 5 min','Bodyweight Squats – 3 × 12','Wall Push-ups – 3 × 12']},
      {title:'Days 11–20 (Intermediate)', dayStart:11, dayEnd:20, video:'', exercises:['Jumping Jacks – 3 × 30 sec','Squats – 4 × 15']},
      {title:'Days 21–30 (Advanced)', dayStart:21, dayEnd:30, video:'', exercises:['4 Rounds:','20 Squats','15 Push-ups']},
      {title:'Days 31–40 (Elite)', dayStart:31, dayEnd:40, video:'', exercises:['5 Rounds:','20 Jump Squats','20 Push-ups']}
    ],
    restDays:'7,14,21,28,35',
    restActivities:['30-minute easy walk','Stretching'],
    expectedResults:['Improved stamina','Better strength'],
    createdAt: Date.now()
  };
}

/* ---------------- Routing & Rendering ---------------- */
function go(view, params){
  detachListeners();
  ROUTE = Object.assign({view}, params||{});
  render();
}

async function render(){
  const app = document.getElementById('app');
  if(!FIREBASE_READY){
    app.innerHTML = `<div class="loading">Firebase Error: Please check your configuration in index.html</div>`;
    return;
  }
  
  if(ROUTE.view==='landing') renderLanding();
  else if(ROUTE.view==='owner-gate') renderOwnerGate();
  else if(ROUTE.view==='owner-dash') renderOwnerDash();
  else if(ROUTE.view==='owner-form') renderOwnerForm(ROUTE.id||null);
  else if(ROUTE.view==='client-gate') renderClientGate();
  else if(ROUTE.view==='plan-view') renderPlanView(ROUTE.id, ROUTE.asOwner);
}

function renderLanding(){
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="gym-name">PRANALZ <span class="hl">FITNESS CLUB</span></div>
        <h1>Your Plan. Your Progress.</h1>
        <p>Personalized diet and home workout plans, private progress tracking, and follow-along videos.</p>
        <div class="feature-strip">
          <div class="feature-pill"><span class="em">🎥</span> Workout Videos</div>
          <div class="feature-pill"><span class="em">🔒</span> Private Plans</div>
          <div class="feature-pill"><span class="em">📈</span> Tracking</div>
        </div>
      </div>
    </div>
    <div class="doors">
      <div class="door" onclick="go('owner-gate')">
        <div class="icon-badge">🔑</div>
        <h3>Owner Dashboard</h3>
        <button class="btn btn-primary btn-full">Enter Dashboard</button>
      </div>
      <div class="door" onclick="go('client-gate')">
        <div class="icon-badge">💪</div>
        <h3>Member Access</h3>
        <button class="btn btn-outline btn-full">View My Plan</button>
        <div class="privacy-note"><span class="lock">🔒</span><span>Private Access with Your Code</span></div>
      </div>
    </div>
    <div class="footer-quote">"Discipline + Consistency = <strong>Transformation.</strong>" 💪</div>
  `;
}

async function renderOwnerGate(){
  const saved = await getOwnerPasscode();
  const firstRun = !saved;
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span><span class="brand">OWNER LOGIN</span></div>
    <div class="card" style="max-width:420px;margin:40px auto;">
      <h2 style="margin-top:0;">${firstRun ? 'Set Passcode' : 'Enter Passcode'}</h2>
      <label>Passcode</label>
      <input id="pc" type="password" placeholder="Passcode">
      <div id="pcErr" class="err"></div>
      <button class="btn btn-primary btn-full" style="margin-top:18px;" onclick="submitPasscode(${firstRun})">${firstRun?'Set & Continue':'Login'}</button>
    </div>
  `;
}

async function submitPasscode(firstRun){
  const val = document.getElementById('pc').value.trim();
  if(!val){ document.getElementById('pcErr').textContent='Required'; return; }
  if(firstRun){
    await setOwnerPasscode(val);
    owner_ok = true; go('owner-dash');
  } else {
    const saved = await getOwnerPasscode();
    if(saved === val){ owner_ok = true; go('owner-dash'); }
    else { document.getElementById('pcErr').textContent='Incorrect Passcode'; }
  }
}

async function renderOwnerDash(){
  if(!owner_ok){ return go('owner-gate'); }
  document.getElementById('app').innerHTML = '<div class="loading">Loading Dashboard...</div>';
  dashUnsub = watchMembersList(list => paintOwnerDash(list));
}

function paintOwnerDash(index){
  let cardsHtml = '';
  for(const c of index){
    const doneDays = c.doneDays || [];
    const pct = Math.round((doneDays.length / (c.totalDays||40))*100);
    const expired = isExpired(c.expiryDate);
    
    cardsHtml += `
      <div class="card client-card">
        <button class="delete-x" onclick="deleteClient('${c.id}')">✕</button>
        <div class="tag">${esc((c.goal||'').split(',')[0])}</div>
        <h3>${esc(c.name)}</h3>
        <div class="meta">${esc(c.age)} Yrs · ${esc(c.weight)}</div>
        <div style="font-size:12px; margin-bottom:10px; color:${expired?'var(--red)':'var(--chalk-dim)'}">${expired?'Expired':'Expiry'}: ${esc(c.expiryDate)}</div>
        <div class="progress-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
          <div class="progress-label">${doneDays.length}/${c.totalDays} days done</div>
        </div>
        <div class="row-btns">
          <button class="btn btn-primary btn-sm" onclick="go('plan-view',{id:'${c.id}',asOwner:true})">View</button>
          <button class="btn btn-ghost btn-sm" onclick="go('owner-form',{id:'${c.id}'})">Edit</button>
          <button class="btn btn-outline btn-sm" onclick="copyCode('${c.id}')">Code</button>
        </div>
      </div>`;
  }
  
  if(!index.length) cardsHtml = '<div class="empty">No members found.</div>';

  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="brand">OWNER PANEL</span><span class="back" onclick="owner_ok=false;go('landing')">Logout</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
      <h2 style="margin:0;">Members (${index.length})</h2>
      <button class="btn btn-primary" onclick="go('owner-form')">+ New</button>
    </div>
    <div class="grid-clients">${cardsHtml}</div>
  `;
}

async function deleteClient(id){
  if(confirm('Delete member?')){
    await deleteMember(id);
    toast('Deleted');
  }
}

async function copyCode(id){
  navigator.clipboard.writeText(id).then(()=>toast('Code Copied: '+id));
}

async function renderOwnerForm(id){
  if(!owner_ok){ return go('owner-gate'); }
  let data = id ? await getMember(id) : sampleClient();
  
  const phaseHtml = data.phases.map((p,i)=>`
    <div class="phase-edit">
      <div class="ph-title">Phase ${i+1}</div>
      <input id="ph_title_${i}" value="${esc(p.title)}" placeholder="Title">
      <div class="two-col" style="margin-top:10px">
        <input id="ph_start_${i}" type="number" value="${p.dayStart}">
        <input id="ph_end_${i}" type="number" value="${p.dayEnd}">
      </div>
      <textarea id="ph_ex_${i}" style="margin-top:10px" placeholder="Exercises (one per line)">${expandBrLines(p.exercises).join('\n')}</textarea>
      <input id="ph_video_${i}" style="margin-top:10px" placeholder="Full Video Link" value="${esc(p.video)}">
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('owner-dash')">← Cancel</span><span class="brand">MEMBER PLAN</span></div>
    <div class="card">
      <div class="two-col">
        <div><label>Name</label><input id="f_name" value="${esc(data.name)}"></div>
        <div><label>Age</label><input id="f_age" type="number" value="${data.age}"></div>
      </div>
      <div class="two-col">
        <div><label>Weight</label><input id="f_weight" value="${esc(data.weight)}"></div>
        <div><label>Total Days</label><input id="f_totaldays" type="number" value="${data.totalDays}"></div>
      </div>
      <label>Goal</label><input id="f_goal" value="${esc(data.goal)}">
    </div>

    <div class="section-title"><div class="num">2</div><h2>General Rules</h2></div>
    <textarea id="f_rules" class="card" rows="5">${expandBrLines(data.generalRules).join('\n')}</textarea>

    <div class="section-title"><div class="num">3</div><h2>Workout Phases</h2></div>
    ${phaseHtml}

    <div class="section-title"><div class="num">4</div><h2>Rest & Results</h2></div>
    <div class="card">
      <label>Rest Days (7,14...)</label><input id="f_restdays" value="${data.restDays}">
      <label>Rest Activities</label><textarea id="f_restact">${expandBrLines(data.restActivities).join('\n')}</textarea>
      <label>Expiry Date</label><input id="f_expiry" type="date" value="${data.expiryDate}">
    </div>

    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-primary" onclick="saveClient('${id||''}')">Save Member</button>
      <button class="btn btn-ghost" onclick="go('owner-dash')">Cancel</button>
    </div>
  `;
}

async function saveClient(existingId){
  const phases = [];
  for(let i=0;i<4;i++){
    phases.push({
      title: document.getElementById('ph_title_'+i).value,
      dayStart: parseInt(document.getElementById('ph_start_'+i).value),
      dayEnd: parseInt(document.getElementById('ph_end_'+i).value),
      exercises: linesToArr(document.getElementById('ph_ex_'+i).value),
      video: document.getElementById('ph_video_'+i).value
    });
  }

  const id = existingId || genCode();
  const old = existingId ? await getMember(existingId) : null;

  const data = {
    id,
    name: document.getElementById('f_name').value || 'New Member',
    age: document.getElementById('f_age').value,
    weight: document.getElementById('f_weight').value,
    goal: document.getElementById('f_goal').value,
    totalDays: parseInt(document.getElementById('f_totaldays').value),
    generalRules: linesToArr(document.getElementById('f_rules').value),
    phases,
    restDays: document.getElementById('f_restdays').value,
    restActivities: linesToArr(document.getElementById('f_restact').value),
    expiryDate: document.getElementById('f_expiry').value,
    expectedResults: old ? old.expectedResults : [],
    doneDays: old ? old.doneDays : [],
    createdAt: old ? old.createdAt : Date.now()
  };

  await saveMember(id, data);
  toast('Saved');
  go('owner-dash');
}

function renderClientGate(){
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span><span class="brand">LOGIN</span></div>
    <div class="card" style="max-width:400px;margin:40px auto;text-align:center;">
      <h2>Member Code</h2>
      <input id="clientCode" placeholder="ABC123" style="text-align:center; text-transform:uppercase; font-size:24px;">
      <div id="codeErr" class="err"></div>
      <button class="btn btn-primary btn-full" style="margin-top:20px;" onclick="tryClientCode()">View Plan</button>
    </div>
  `;
}

async function tryClientCode(){
  const code = document.getElementById('clientCode').value.trim().toUpperCase();
  const data = await getMember(code);
  if(data) go('plan-view',{id:code, asOwner:false});
  else document.getElementById('codeErr').textContent = 'Invalid Code';
}

function renderPlanView(id, asOwner){
  planUnsub = watchMember(id, data => paintPlanView(id, asOwner, data));
}

function paintPlanView(id, asOwner, data){
  if(!data){ go('landing'); return; }

  if(!asOwner && isExpired(data.expiryDate)){
    document.getElementById('app').innerHTML = `<div class="card" style="max-width:500px;margin:100px auto;text-align:center;"><h2>Membership Expired</h2><p>Please contact gym owner.</p><button class="btn btn-primary" onclick="go('landing')">Back Home</button></div>`;
    return;
  }

  const doneDays = data.doneDays || [];
  const restDaysArr = (data.restDays||'').split(',').map(s=>parseInt(s.trim())).filter(Boolean);

  const phasesHtml = data.phases.map((p,i)=>{
    const exHtml = p.exercises.map(e=>{
      const term = exerciseSearchTerm(e);
      const matched = findExerciseVideo(term);
      const url = matched ? matched.url : (term ? 'https://www.youtube.com/results?search_query='+encodeURIComponent(term+' exercise') : null);
      return `<li><span class="ex-text">${esc(e)}</span>${url?`<a class="ex-watch" href="${url}" target="_blank">▶ Watch</a>`:''}</li>`;
    }).join('');

    let punchHtml='';
    for(let d=p.dayStart; d<=p.dayEnd; d++){
      const isRest = restDaysArr.includes(d), isDone = doneDays.includes(d);
      punchHtml += `<div class="punch ${isDone?'done':''} ${isRest&&!isDone?'rest':''}" onclick="toggleDay('${id}',${d})">${isDone?'✓':(isRest?'R':d)}</div>`;
    }

    return `
      <div class="phase" id="phase_${i}">
        <div class="phase-head" onclick="document.getElementById('phase_${i}').classList.toggle('open')">
          <div><h3>${esc(p.title)}</h3><div class="sub">Days ${p.dayStart}-${p.dayEnd}</div></div>
          <div class="arrow">▾</div>
        </div>
        <div class="phase-body">
          <ul class="ex-list">${exHtml}</ul>
          <div class="punchcard">${punchHtml}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('${asOwner?'owner-dash':'landing'}')">← Back</span><span class="brand">MY PLAN</span></div>
    <div class="hero">
      <h1>${esc(data.name)}</h1>
      <p>${esc(data.goal)}</p>
      <div class="stat-grid" style="max-width:400px;margin:20px auto;">
        <div class="stat-box"><div class="val">${esc(data.weight)}</div><div class="lbl">Weight</div></div>
        <div class="stat-box"><div class="val">${doneDays.length}/${data.totalDays}</div><div class="lbl">Days Done</div></div>
      </div>
      ${asOwner?`<div class="code-box">Member Code: <span class="code">${id}</span></div>`:''}
    </div>
    <div class="section-title"><div class="num">✓</div><h2>General Rules</h2></div>
    <ul class="rules-list">${expandBrLines(data.generalRules).map(r=>`<li>${esc(r)}</li>`).join('')}</ul>
    <div class="section-title"><div class="num">🏋️</div><h2>Workout Plan</h2></div>
    ${phasesHtml}
  `;
}

async function toggleDay(id, day){
  const m = await getMember(id);
  if(!m) return;
  let doneDays = m.doneDays || [];
  const idx = doneDays.indexOf(day);
  if(idx>=0) doneDays.splice(idx,1); else doneDays.push(day);
  await updateMemberProgress(id, doneDays);
}

// Initial Run
go('landing');
</script>
