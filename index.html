<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranal'z Fitness Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0F1013;
    --surface:#191B1F;
    --surface-2:#212327;
    --line:#31333A;
    --chalk:#F5F2EA;
    --chalk-dim:#9B978D;
    --red:#FF4B36;
    --red-dim:#3A1712;
    --green:#34D399;
    --gold:#E8B84B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--chalk);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
  }

  /* --- Full Screen Image Background --- */
  .landing-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    background: url('gym.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(3px); /* Premium Blur */
    transform: scale(1.1);
  }
  /* --- Dark Overlay (70%) --- */
  .landing-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
    background: rgba(0, 0, 0, 0.72);
  }
  
  /* Fade-in Animation */
  .fade-in {
    animation: smoothFade 1.2s ease-out forwards;
  }
  @keyframes smoothFade {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #app {
    position: relative;
    z-index: 10;
    max-width:1080px;
    margin:0 auto;
    padding:20px 16px 60px;
  }

  h1,h2,h3,.display{
    font-family:'Anton',sans-serif;
    font-weight:400;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--chalk);
  }
  .mono{font-family:'Space Mono',monospace;}
  .btn{
    font-family:'Work Sans',sans-serif;
    font-weight:700;
    border:none;
    cursor:pointer;
    padding:14px 22px;
    border-radius:10px;
    font-size:15px;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-outline{background:rgba(255,255,255,0.05);color:var(--chalk);border:2px solid var(--line);backdrop-filter: blur(10px);}
  .btn-outline:hover{border-color:var(--red); background:rgba(255,75,54,0.1);}
  .btn-full{width:100%;}
  
  .card{
    background:rgba(25, 27, 31, 0.85);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    backdrop-filter: blur(10px);
  }
  .hero{
    position:relative;text-align:center;padding:56px 20px 40px;border-radius:22px;margin-bottom:26px;
    background:radial-gradient(ellipse at top, rgba(27,29,34,0.4) 0%, rgba(15,16,19,0.1) 72%);
    border:1px solid var(--line);overflow:hidden;
  }
  .hero-inner{position:relative;z-index:1;}
  .gym-name{
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
    font-size:clamp(34px,7.5vw,58px);line-height:1.02;letter-spacing:1px;
    margin-bottom:14px;color:var(--chalk);
  }
  .gym-name .hl{
    color:var(--red);
    text-shadow:0 0 26px rgba(255,75,54,0.45);
  }
  .hero h1{font-size:22px;color:var(--chalk-dim);font-family:'Work Sans',sans-serif;margin:0 0 10px;}
  .hero p{color:var(--chalk-dim);margin:0 auto;font-size:15.5px;max-width:480px;line-height:1.5;}
  
  .doors{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:30px;}
  @media (max-width:640px){.doors{grid-template-columns:1fr;}}
  .door{
    position:relative;background:rgba(25, 27, 31, 0.6);border:1.5px solid var(--line);border-radius:16px;
    padding:30px 22px;text-align:center;cursor:pointer;transition:.18s;overflow:hidden;
    backdrop-filter: blur(8px);
  }
  .door:hover{border-color:var(--red);transform:translateY(-3px);}
  
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .topbar .brand{font-size:15px;letter-spacing:1px;color:var(--red);font-weight:700;}
  .back{color:var(--chalk-dim);cursor:pointer;font-size:14px;font-weight:600;}
  
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--chalk);color:var(--bg);padding:12px 22px;border-radius:10px;font-weight:700;font-size:14px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; transition:opacity .25s ease;pointer-events: none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<!-- Background Layers Only for Landing -->
<div id="bg-layer" style="display:none;">
    <div class="landing-bg"></div>
    <div class="landing-overlay"></div>
</div>

<div id="app"><div class="loading">Loading Pranal'z Fitness Club...</div></div>
<div id="toast" class="toast"></div>

<script>
/* ---------------- State ---------------- */
let ROUTE = {view:'landing'};
let owner_ok = false;
let dashUnsub = null;
let planUnsub = null;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBohVuvHcrFYtjg-zE44EWOordtvq7ZNqg",
  authDomain: "pranalz-fitness-club.firebaseapp.com",
  projectId: "pranalz-fitness-club",
  storageBucket: "pranalz-fitness-club.firebasestorage.app",
  messagingSenderId: "255308644168",
  appId: "1:255308644168:web:22ac462201613f187b7d7d"
};

let db = null, FIREBASE_READY = false;
try{
  if(typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey){
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    FIREBASE_READY = true;
  }
}catch(e){ console.error('Firebase failed:', e); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------------- Navigation ---------------- */
function go(view, params){
  ROUTE = Object.assign({view}, params||{});
  render();
}

async function render(){
  const app = document.getElementById('app');
  const bg = document.getElementById('bg-layer');
  
  if(!FIREBASE_READY){
    app.innerHTML = `<div class="loading">Firebase Error.</div>`;
    return;
  }

  // Show background only on landing page
  bg.style.display = (ROUTE.view === 'landing') ? 'block' : 'none';

  if(ROUTE.view==='landing') renderLanding();
  else if(ROUTE.view==='owner-gate') renderOwnerGate();
  else if(ROUTE.view==='client-gate') renderClientGate();
}

function renderLanding(){
  document.getElementById('app').innerHTML = `
    <div class="fade-in">
        <div class="hero">
          <div class="hero-inner">
            <div class="gym-name">PRANAL'Z <span class="hl">FITNESS CLUB</span></div>
            <h1>Your Plan. Your Progress.</h1>
            <p>Personalised home workout plans and progress tracking.</p>
          </div>
        </div>
        <div class="doors">
          <div class="door" onclick="go('owner-gate')"><h3>Owner Dashboard</h3><button class="btn btn-primary btn-full">Login</button></div>
          <div class="door" onclick="go('client-gate')"><h3>Member Access</h3><button class="btn btn-outline btn-full">View My Plan</button></div>
        </div>
    </div>
  `;
}

function renderOwnerGate(){
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span></div>
    <div class="card" style="max-width:420px;margin:40px auto;">
      <h2>Owner Login</h2>
      <input id="pc" type="password" placeholder="Passcode">
      <button class="btn btn-primary btn-full" style="margin-top:18px;">Continue</button>
    </div>
  `;
}

function renderClientGate(){
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span></div>
    <div class="card" style="max-width:400px;margin:40px auto;text-align:center;">
      <h2>Enter Member Code</h2>
      <input id="clientCode" placeholder="Code" style="text-align:center;">
      <button class="btn btn-primary btn-full" style="margin-top:20px;">View My Plan</button>
    </div>
  `;
}

go('landing');
</script>
</body>
</html>
