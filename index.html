<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranalz Fitness Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#0F1013;
    --surface:#191B1F;
    --surface-2:#212327;
    --line:#31333A;
    --chalk:#F5F2EA;
    --chalk-dim:#9B978D;
    --red:#FF4B36;
    --red-dim:#3A1712;
    --green:#34D399;
    --gold:#E8B84B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--chalk);font-family:'Work Sans',sans-serif;min-height:100vh;}
  .stripes{background-image: repeating-linear-gradient(135deg, rgba(255,75,54,0.09) 0px, rgba(255,75,54,0.09) 12px, transparent 12px, transparent 26px); background-attachment: fixed;}
  
  h1,h2,h3,.display{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:0.5px;text-transform:uppercase;color:var(--chalk);}
  #app{max-width:1080px;margin:0 auto;padding:20px 16px 60px;}

  /* UI Components */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:20px;}
  .btn{font-family:'Work Sans',sans-serif;font-weight:700;border:none;cursor:pointer;padding:14px 22px;border-radius:10px;font-size:15px;transition:transform .12s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-outline{background:transparent;color:var(--chalk);border:2px solid var(--line);}
  .btn-ghost{background:var(--surface-2);color:var(--chalk-dim);}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}
  .btn-full{width:100%;}

  input,textarea,select{width:100%;background:var(--surface-2);border:1.5px solid var(--line);color:var(--chalk);border-radius:8px;padding:12px 14px;font-size:15px;outline:none;margin-bottom:10px;}
  input:focus,textarea:focus{border-color:var(--red);}
  label{display:block;font-size:11px;font-weight:700;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;margin-top:12px;}

  /* Hero Section */
  .hero{position:relative;text-align:center;padding:60px 20px;border-radius:22px;margin-bottom:26px;background:radial-gradient(ellipse at top, #1B1D22 0%, #0F1013 72%);border:1px solid var(--line);overflow:hidden;}
  .gym-name{font-family:'Anton',sans-serif;font-size:clamp(30px,8vw,55px);line-height:1;margin-bottom:10px;}
  .gym-name .hl{color:var(--red);text-shadow:0 0 20px rgba(255,75,54,0.4);}
  
  /* Grid & Layout */
  .doors{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:30px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
  .grid-clients{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  @media (max-width:640px){.doors,.grid-2{grid-template-columns:1fr;}}

  /* Member View Styles */
  .phase{border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .phase-head{padding:16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--surface);}
  .phase-body{padding:0 16px 16px;background:var(--surface);display:none;}
  .phase.open .phase-body{display:block;}
  .ex-list{list-style:none;padding:0;margin:0;}
  .ex-list li{padding:12px 0;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:6px;}
  .ex-watch{background:var(--red-dim);color:var(--red);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none;width:fit-content;}
  
  .punchcard{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-top:15px;}
  .punch{aspect-ratio:1;border:1.5px dashed var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
  .punch.done{background:var(--red);border-style:solid;color:#fff;}

  /* Admin Table Editor */
  .ex-edit-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1.5fr 40px;gap:8px;margin-bottom:8px;}
  @media (max-width:800px){.ex-edit-row{grid-template-columns:1fr 1fr;}}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--chalk);color:var(--bg);padding:12px 22px;border-radius:10px;font-weight:700;z-index:9999;opacity:0;transition:0.3s;pointer-events:none;}
  .toast.show{opacity:1;}
  
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .back{cursor:pointer;color:var(--chalk-dim);font-weight:600;}
</style>
</head>
<body class="stripes">

<div id="app">
  <div style="display:flex;height:100vh;align-items:center;justify-content:center;">
    <h2 class="display">Loading Pranalz Fitness...</h2>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* --- Configuration & Initialization --- */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBohVuvHcrFYtjg-zE44EWOordtvq7ZNqg",
  authDomain: "pranalz-fitness-club.firebaseapp.com",
  projectId: "pranalz-fitness-club",
  storageBucket: "pranalz-fitness-club.firebasestorage.app",
  messagingSenderId: "255308644168",
  appId: "1:255308644168:web:22ac462201613f187b7d7d"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

let ROUTE = {view: 'landing'};
let owner_ok = false;
let current_unsub = null;

const DEFAULT_VIDEOS = [
  ['jump squat', 'tZjZxrAeVjg'], ['jumping jack', 'F_rq04M0x5M'], ['wall push-up', 'dhjjqFfUVlg'],
  ['push-up', 'WDIpL0pjun0'], ['squat', 'DlS-GAF8Edg'], ['glute bridge', 'SKOMwg1JLrU'],
  ['plank', 'mwlp75MS6Rg'], ['lunge', '-_270H-3Wrc'], ['mountain climber', 'ELCyvGG8RHA']
];

/* --- Utils --- */
function toast(m){const t=document.getElementById('toast');t.innerText=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function esc(s){const d=document.createElement('div');d.innerText=s||'';return d.innerHTML;}
function genId(){return Math.random().toString(36).substr(2, 6).toUpperCase();}
function isExpired(date){if(!date) return false; return new Date() > new Date(date + "T23:59:59");}

function getVidUrl(name, customUrl){
  if(customUrl && customUrl.includes('youtu')) return customUrl.includes('watch?v=') ? customUrl : 'https://www.youtube.com/watch?v='+customUrl;
  const match = DEFAULT_VIDEOS.find(v => name.toLowerCase().includes(v[0]));
  return match ? 'https://www.youtube.com/watch?v='+match[1] : null;
}

/* --- Views --- */
function go(v, p){
  if(current_unsub) current_unsub();
  ROUTE = {view: v, ...p};
  render();
}

async function render(){
  const app = document.getElementById('app');
  if(ROUTE.view === 'landing') renderLanding(app);
  if(ROUTE.view === 'owner-gate') renderOwnerGate(app);
  if(ROUTE.view === 'owner-dash') renderOwnerDash(app);
  if(ROUTE.view === 'owner-form') renderOwnerForm(app, ROUTE.id);
  if(ROUTE.view === 'client-gate') renderClientGate(app);
  if(ROUTE.view === 'plan-view') renderPlanView(app, ROUTE.id, ROUTE.asOwner);
}

function renderLanding(app){
  app.innerHTML = `
    <div class="hero">
      <div class="gym-name">PRANALZ <span class="hl">FITNESS CLUB</span></div>
      <p>Personalised Training & Results Tracking</p>
    </div>
    <div class="doors">
      <div class="door card" onclick="go('owner-gate')"><h3>Owner Portal</h3><button class="btn btn-primary btn-full">Login</button></div>
      <div class="door card" onclick="go('client-gate')"><h3>Member View</h3><button class="btn btn-outline btn-full">My Plan</button></div>
    </div>
  `;
}

async function renderOwnerGate(app){
  app.innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span></div>
    <div class="card" style="max-width:400px;margin:auto;">
      <h2>Owner Access</h2>
      <label>Admin Passcode</label>
      <input type="password" id="pass" placeholder="••••">
      <button class="btn btn-primary btn-full" onclick="login()">Unlock Dashboard</button>
    </div>
  `;
}

async function login(){
  const p = document.getElementById('pass').value;
  const s = await db.collection('settings').doc('admin').get();
  const correct = s.exists ? s.data().pass : '1234';
  if(p === correct){ owner_ok = true; go('owner-dash'); } else toast('Invalid Passcode');
}

function renderOwnerDash(app){
  if(!owner_ok) return go('owner-gate');
  app.innerHTML = `<div class="topbar"><h2>Members</h2><button class="btn btn-primary btn-sm" onclick="go('owner-form')">+ Add Member</button></div><div id="list" class="grid-clients">Loading...</div>
  <hr style="border:0;border-top:1px solid var(--line);margin:40px 0;">
  <div class="card" style="max-width:400px;">
    <h3>Admin Settings</h3>
    <label>Change Passcode</label>
    <input id="newpass" type="text" placeholder="New Passcode">
    <button class="btn btn-ghost btn-sm" onclick="changePass()">Update Password</button>
  </div>`;
  
  current_unsub = db.collection('members').onSnapshot(snap => {
    document.getElementById('list').innerHTML = snap.docs.map(doc => {
      const m = doc.data();
      return `
        <div class="card">
          <h3 style="margin:0">${esc(m.name)}</h3>
          <p style="font-size:12px;color:var(--chalk-dim)">ID: ${doc.id} | Exp: ${m.expiryDate || 'No Date'}</p>
          <div class="grid-2">
            <button class="btn btn-primary btn-sm" onclick="go('plan-view',{id:'${doc.id}',asOwner:true})">View</button>
            <button class="btn btn-ghost btn-sm" onclick="go('owner-form',{id:'${doc.id}'})">Edit</button>
          </div>
          <button class="btn btn-sm btn-full" style="margin-top:10px;color:var(--red);background:var(--red-dim)" onclick="deleteMember('${doc.id}')">Delete</button>
        </div>
      `;
    }).join('');
  });
}

async function changePass(){
  const p = document.getElementById('newpass').value;
  if(p) { await db.collection('settings').doc('admin').set({pass:p}); toast('Passcode Updated'); }
}

async function deleteMember(id){
  if(confirm('Delete member?')) await db.collection('members').doc(id).delete();
}

async function renderOwnerForm(app, id){
  let d = {
    name:'', age:'', gender:'Male', height:'', weight:'', mobile:'', goal:'', expiryDate:'', 
    totalDays:40, trainerNotes:'', expectedResults:[], weeklyRest:{}
  };
  if(id){ const res = await db.collection('members').doc(id).get(); d = res.data(); }

  app.innerHTML = `
    <div class="topbar"><span class="back" onclick="go('owner-dash')">← Cancel</span><h2>${id?'Edit':'New'} Member</h2></div>
    <div class="card">
      <div class="grid-2">
        <div><label>Name</label><input id="m_name" value="${esc(d.name)}"></div>
        <div><label>Mobile</label><input id="m_mobile" value="${esc(d.mobile)}"></div>
      </div>
      <div class="grid-2">
        <div><label>Age</label><input id="m_age" value="${esc(d.age)}"></div>
        <div><label>Expiry Date</label><input type="date" id="m_exp" value="${d.expiryDate}"></div>
      </div>
      <div class="grid-2">
        <div><label>Weight</label><input id="m_weight" value="${esc(d.weight)}"></div>
        <div><label>Goal</label><input id="m_goal" value="${esc(d.goal)}"></div>
      </div>
      <label>Trainer Notes</label><textarea id="m_notes">${esc(d.trainerNotes)}</textarea>
    </div>

    <h3>Workout Plan (Phases)</h3>
    <div id="phases-container">
      ${[0,1,2,3].map(i => {
        const p = (d.phases && d.phases[i]) || {title: `Phase ${i+1}`, dayStart:(i*10)+1, dayEnd:(i+1)*10, exercises:[]};
        return `
          <div class="card phase-editor" data-idx="${i}">
            <div class="grid-2">
              <input class="p-title" value="${esc(p.title)}">
              <div style="display:flex;gap:5px;">
                <input class="p-start" type="number" value="${p.dayStart}">
                <input class="p-end" type="number" value="${p.dayEnd}">
              </div>
            </div>
            <div class="ex-list-edit">
              ${(p.exercises||[]).map(ex => renderExRow(ex)).join('')}
            </div>
            <button class="btn btn-ghost btn-sm" onclick="addEx(this)">+ Add Exercise</button>
          </div>
        `;
      }).join('')}
    </div>

    <h3>Recovery & Results</h3>
    <div class="card">
      <label>Rest Days (e.g. 7, 14, 21...)</label><input id="r_days" value="${esc(d.weeklyRest?.restDays)}">
      <label>Expected Results (One per line)</label>
      <textarea id="r_results" style="height:120px">${(d.expectedResults||[]).join('\n')}</textarea>
    </div>

    <button class="btn btn-primary btn-full" onclick="saveMember('${id||''}')">Save Member Profile</button>
  `;
}

function renderExRow(ex={name:'', sets:'', reps:'', duration:'', videoUrl:''}){
  return `<div class="ex-edit-row">
    <input class="e-name" placeholder="Name" value="${esc(ex.name)}">
    <input class="e-sets" placeholder="Sets" value="${esc(ex.sets)}">
    <input class="e-reps" placeholder="Reps" value="${esc(ex.reps)}">
    <input class="e-dur" placeholder="Time" value="${esc(ex.duration)}">
    <input class="e-vid" placeholder="YouTube URL" value="${esc(ex.videoUrl)}">
    <button class="btn btn-sm" onclick="this.parentElement.remove()">✕</button>
  </div>`;
}

function addEx(btn){ const div = document.createElement('div'); div.innerHTML = renderExRow(); btn.previousElementSibling.appendChild(div.firstChild); }

async function saveMember(id){
  const mid = id || genId();
  const phases = Array.from(document.querySelectorAll('.phase-editor')).map(p => ({
    title: p.querySelector('.p-title').value,
    dayStart: parseInt(p.querySelector('.p-start').value),
    dayEnd: parseInt(p.querySelector('.p-end').value),
    exercises: Array.from(p.querySelectorAll('.ex-edit-row')).map(row => ({
      name: row.querySelector('.e-name').value,
      sets: row.querySelector('.e-sets').value,
      reps: row.querySelector('.e-reps').value,
      duration: row.querySelector('.e-dur').value,
      videoUrl: row.querySelector('.e-vid').value
    }))
  }));

  const data = {
    name: document.getElementById('m_name').value,
    mobile: document.getElementById('m_mobile').value,
    age: document.getElementById('m_age').value,
    expiryDate: document.getElementById('m_exp').value,
    weight: document.getElementById('m_weight').value,
    goal: document.getElementById('m_goal').value,
    trainerNotes: document.getElementById('m_notes').value,
    phases,
    weeklyRest: { restDays: document.getElementById('r_days').value },
    expectedResults: document.getElementById('r_results').value.split('\n').filter(x=>x),
    updatedAt: Date.now()
  };
  
  if(!id) { data.doneDays = []; data.createdAt = Date.now(); }
  await db.collection('members').doc(mid).set(data, {merge:true});
  toast('Member Saved!');
  go('owner-dash');
}

function renderClientGate(app){
  app.innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span></div>
    <div class="card" style="max-width:400px;margin:auto;text-align:center;">
      <h2>Member Login</h2>
      <label>Enter Your Unique Code</label>
      <input id="m_code" style="text-align:center;font-size:24px;text-transform:uppercase;">
      <button class="btn btn-primary btn-full" onclick="loginClient()">Access My Plan</button>
    </div>
  `;
}

async function loginClient(){
  const c = document.getElementById('m_code').value.toUpperCase();
  const snap = await db.collection('members').doc(c).get();
  if(snap.exists) go('plan-view', {id:c, asOwner:false}); else toast('Code Not Found');
}

function renderPlanView(app, id, asOwner){
  current_unsub = db.collection('members').doc(id).onSnapshot(snap => {
    const d = snap.data();
    if(!d) return;

    if(!asOwner && isExpired(d.expiryDate)){
      app.innerHTML = `<div class="card" style="text-align:center;margin-top:100px;border-color:var(--red);">
        <h1 style="color:var(--red)">Membership Expired</h1>
        <p>Your Membership Has Expired. Please contact the gym to renew.</p>
        <button class="btn btn-outline" onclick="go('landing')">Go Back</button>
      </div>`;
      return;
    }

    const phasesHtml = (d.phases||[]).map((p, i) => {
      const exHtml = (p.exercises||[]).map(ex => {
        const v = getVidUrl(ex.name, ex.videoUrl);
        return `<li>
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div><b>${esc(ex.name)}</b><br><small style="color:var(--gold)">${esc(ex.sets)} Sets | ${esc(ex.reps)} Reps | ${esc(ex.duration)}</small></div>
            ${v?`<a class="ex-watch" href="${v}" target="_blank">▶ Watch</a>`:''}
          </div>
        </li>`;
      }).join('');

      let punches = '';
      for(let day=p.dayStart; day<=p.dayEnd; day++){
        const done = (d.doneDays||[]).includes(day);
        punches += `<div class="punch ${done?'done':''}" onclick="toggleDay('${id}',${day})">${done?'✓':day}</div>`;
      }

      return `
        <div class="phase ${i===0?'open':''}">
          <div class="phase-head" onclick="this.parentElement.classList.toggle('open')"><h3>${esc(p.title)}</h3><span>▼</span></div>
          <div class="phase-body">
            <ul class="ex-list">${exHtml}</ul>
            <div class="punchcard">${punches}</div>
          </div>
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <div class="topbar"><span class="back" onclick="go('${asOwner?'owner-dash':'landing'}')">← Exit</span></div>
      <div class="hero">
        <div class="gym-name" style="font-size:32px;">${esc(d.name)}</div>
        <p>${esc(d.goal)}</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:15px;font-size:12px;">
          <div class="card" style="padding:10px;margin:0;">Weight: ${esc(d.weight)}</div>
          <div class="card" style="padding:10px;margin:0;">Age: ${esc(d.age)}</div>
          <div class="card" style="padding:10px;margin:0;">Done: ${(d.doneDays||[]).length} Days</div>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--chalk-dim)">Valid Until: ${d.expiryDate || 'N/A'}</div>
      </div>

      ${d.trainerNotes?`<div class="card" style="border-left:4px solid var(--gold)"><b>Note:</b> ${esc(d.trainerNotes)}</div>`:''}

      <div style="margin:20px 0;">${phasesHtml}</div>

      <h3>Recovery & Goals</h3>
      <div class="card">
        <p><b>Rest Days:</b> ${esc(d.weeklyRest?.restDays)}</p>
        <ul style="padding-left:20px;color:var(--green)">
          ${(d.expectedResults||[]).map(r => `<li>${esc(r)}</li>`).join('')}
        </ul>
      </div>
      <div style="text-align:center;margin:40px 0;opacity:0.5;">"Consistency is the Key"</div>
    `;
  });
}

async function toggleDay(id, day){
  const doc = await db.collection('members').doc(id).get();
  let done = doc.data().doneDays || [];
  if(done.includes(day)) done = done.filter(x => x !== day); else done.push(day);
  await db.collection('members').doc(id).update({doneDays: done});
}

// Start
go('landing');
</script>

</body>
</html>
