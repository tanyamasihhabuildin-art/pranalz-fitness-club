<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranalz Fitness Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0F1013;
    --surface:#191B1F;
    --surface-2:#212327;
    --line:#31333A;
    --chalk:#F5F2EA;
    --chalk-dim:#9B978D;
    --red:#FF4B36;
    --red-dim:#3A1712;
    --green:#34D399;
    --gold:#E8B84B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--chalk);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
  }

  /* --- Premium Background Styles --- */
  .main-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: url('gym-bg.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(3px); /* 3px Blur as requested */
    transform: scale(1.1); /* Prevents white edges from blur */
  }
  .main-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    background: rgba(0, 0, 0, 0.7); /* 70% Dark Overlay for readability */
  }
  
  /* Fade-in Animation */
  .fade-in {
    animation: fadeInAnimation 1.2s ease-out forwards;
  }
  @keyframes fadeInAnimation {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Content Wrapper to stay above BG */
  #app {
    position: relative;
    z-index: 10;
    max-width:1080px;
    margin:0 auto;
    padding:20px 16px 60px;
  }

  .stripes{
    background-image: repeating-linear-gradient(135deg, rgba(255,75,54,0.05) 0px, rgba(255,75,54,0.05) 12px, transparent 12px, transparent 26px);
  }
  h1,h2,h3,.display{
    font-family:'Anton',sans-serif;
    font-weight:400;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--chalk);
  }
  .mono{font-family:'Space Mono',monospace;}
  .btn{
    font-family:'Work Sans',sans-serif;
    font-weight:700;
    border:none;
    cursor:pointer;
    padding:14px 22px;
    border-radius:10px;
    font-size:15px;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-outline{background:rgba(255,255,255,0.1);color:var(--chalk);border:2px solid var(--line);backdrop-filter: blur(5px);}
  .btn-outline:hover{border-color:var(--red); background:rgba(255,75,54,0.1);}
  .btn-ghost{background:var(--surface-2);color:var(--chalk-dim);}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}
  .btn-full{width:100%;}
  input,textarea{
    width:100%;
    background:var(--surface-2);
    border:1.5px solid var(--line);
    color:var(--chalk);
    border-radius:8px;
    padding:12px 14px;
    font-family:'Work Sans',sans-serif;
    font-size:15px;
    outline:none;
  }
  input:focus,textarea:focus{border-color:var(--red);}
  textarea{resize:vertical;min-height:90px;line-height:1.6;}
  label{
    display:block;font-size:13px;font-weight:700;color:var(--chalk-dim);
    text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;margin-top:18px;
  }
  label:first-child{margin-top:0;}
  .card{
    background:rgba(25, 27, 31, 0.85);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    backdrop-filter: blur(10px);
  }
  .hero{
    position:relative;text-align:center;padding:56px 20px 40px;border-radius:22px;margin-bottom:26px;
    background:radial-gradient(ellipse at top, rgba(27, 29, 34, 0.4) 0%, rgba(15, 16, 19, 0.2) 72%);
    border:1px solid var(--line);overflow:hidden;
  }
  .hero-inner{position:relative;z-index:1;}
  .gym-name{
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
    font-size:clamp(34px,7.5vw,58px);line-height:1.02;letter-spacing:1px;
    margin-bottom:14px;color:var(--chalk);
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .gym-name .hl{
    color:var(--red);
    text-shadow:0 0 26px rgba(255,75,54,0.45);
  }
  .hero h1{font-size:22px;letter-spacing:0.5px;color:var(--chalk-dim);font-weight:600;text-transform:none;font-family:'Work Sans',sans-serif;margin:0 0 10px;background:none;-webkit-text-fill-color:var(--chalk-dim);}
  .hero p{color:var(--chalk-dim);margin:0 auto;font-size:15.5px;max-width:480px;line-height:1.5;}
  
  .doors{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:30px;}
  @media (max-width:640px){.doors{grid-template-columns:1fr;}}
  .door{
    position:relative;background:rgba(25, 27, 31, 0.6);border:1.5px solid var(--line);border-radius:16px;
    padding:30px 22px;text-align:center;cursor:pointer;transition:.18s;overflow:hidden;
    backdrop-filter: blur(8px);
  }
  .door:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.35);}
  
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .topbar .brand{font-size:15px;letter-spacing:1px;color:var(--red);font-weight:700;}
  .back{color:var(--chalk-dim);cursor:pointer;font-size:14px;font-weight:600;}
  /* Remaining original styles... */
  .grid-clients{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .client-card{position:relative;overflow:hidden;}
  .client-card .tag{display:inline-block;background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
  .progress-wrap{margin-bottom:14px;}
  .progress-bar-bg{background:var(--surface-2);border-radius:8px;height:8px;overflow:hidden;}
  .progress-bar-fill{background:var(--green);height:100%;}
  .section-title{display:flex;align-items:center;gap:10px;margin:34px 0 14px;}
  .section-title .num{font-family:'Space Mono',monospace;background:var(--red);color:#fff;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
  .rules-list{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .rules-list li{background:var(--surface-2);padding:12px 14px;border-radius:10px;font-size:14px;}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:6px;}
  .stat-box{background:var(--surface-2);border-radius:10px;padding:14px;text-align:center;}
  .stat-box .val{font-family:'Space Mono',monospace;font-size:22px;color:var(--gold);font-weight:700;}
  .stat-box .lbl{font-size:11.5px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
  .phase{border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  .phase-head{padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--surface);}
  .phase-body{padding:0 18px 18px;background:var(--surface);display:none;}
  .phase.open .phase-body{display:block;}
  .ex-list{list-style:none;padding:0;margin:10px 0 16px;}
  .ex-list li{padding:10px 12px;border-bottom:1px solid var(--line);font-size:14.5px;display:flex;gap:10px;align-items:center;justify-content:space-between;}
  .ex-watch{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--red-dim);color:var(--red);border-radius:20px;padding:5px 12px;font-size:11.5px;font-weight:700;text-decoration:none;white-space:nowrap;}
  .punchcard{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin:14px 0;}
  @media (max-width:640px){.punchcard{grid-template-columns:repeat(5,1fr);}}
  .punch{aspect-ratio:1;border:1.5px dashed var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--chalk-dim);cursor:pointer;user-select:none;transition:.12s;}
  .punch.done{background:var(--red);border-style:solid;border-color:var(--red);color:#fff;font-weight:700;}
  .code-box{background:var(--surface-2);border:1.5px dashed var(--gold);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .code-box .code{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:2px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--chalk);color:var(--bg);padding:12px 22px;border-radius:10px;font-weight:700;font-size:14px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; transition:opacity .25s ease;pointer-events: none;}
  .toast.show{opacity:1;}
  .phase-edit{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;background:var(--surface-2);}
  .delete-x{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--chalk-dim);cursor:pointer;font-size:18px;}
</style>
</head>
<body class="stripes">
<!-- Background Layers -->
<div class="main-bg"></div>
<div class="main-overlay"></div>

<div id="app"><div class="loading">Loading Pranalz Fitness Club...</div></div>
<div id="toast" class="toast"></div>

<script>
/* ---------------- State ---------------- */
let ROUTE = {view:'landing'};
let owner_ok = false;
let dashUnsub = null;
let planUnsub = null;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBohVuvHcrFYtjg-zE44EWOordtvq7ZNqg",
  authDomain: "pranalz-fitness-club.firebaseapp.com",
  projectId: "pranalz-fitness-club",
  storageBucket: "pranalz-fitness-club.firebasestorage.app",
  messagingSenderId: "255308644168",
  appId: "1:255308644168:web:22ac462201613f187b7d7d"
};

let db = null, FIREBASE_READY = false;
try{
  if(typeof firebase !== 'undefined' && FIREBASE_CONFIG.apiKey){
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    FIREBASE_READY = true;
  }
}catch(e){ console.error('Firebase failed:', e); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* ---------------- DB Methods ---------------- */
function membersCol(){ return db.collection('members'); }
function settingsDoc(){ return db.collection('settings').doc('owner'); }

async function getOwnerPasscode(){
  try{
    const snap = await settingsDoc().get();
    return snap.exists ? (snap.data().passcode || null) : null;
  }catch(e){ return null; }
}

function watchMembersList(cb){
  return membersCol().orderBy('createdAt','desc').onSnapshot(
    snap => cb(snap.docs.map(d => ({id:d.id, ...d.data()}))),
    err => { console.error('Dash error:', err); cb([]); }
  );
}

async function getMember(code){
  if(!code) return null;
  try{
    const snap = await membersCol().doc(code).get();
    return snap.exists ? {id:snap.id, ...snap.data()} : null;
  }catch(e){ return null; }
}

function watchMember(code, cb){
  return membersCol().doc(code).onSnapshot(
    snap => cb(snap.exists ? {id:snap.id, ...snap.data()} : null),
    err => { console.error('Sync error:', err); cb(null); }
  );
}

async function saveMember(id, data){
  try{ await membersCol().doc(id).set(data); return true; } catch(e){ return false; }
}

async function deleteMember(id){ await membersCol().doc(id).delete(); }

async function updateMemberProgress(id, doneDays){
  await membersCol().doc(id).update({doneDays});
}

function detachListeners(){
  if(dashUnsub){ dashUnsub(); dashUnsub = null; }
  if(planUnsub){ planUnsub(); planUnsub = null; }
}

/* ---------------- Helpers ---------------- */
function esc(str){
  const d=document.createElement('div'); d.innerText = str==null?'':str; return d.innerHTML;
}
function isExpired(expiryDate){
  if(!expiryDate) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(expiryDate); exp.setHours(23,59,59,999);
  return today > exp;
}
function exerciseSearchTerm(line){
  if(!line) return null;
  let t = line.trim();
  if(/^\d+\s*rounds?:?$/i.test(t)) return null;
  t = t.replace(/^finish:\s*/i,'').split(/\s[–—-]\s/)[0].trim().replace(/^\d+\s+/,'');
  return (t.length < 3) ? null : t;
}
const EXERCISE_VIDEO_MAP = [
  ['jump squat', 'tZjZxrAeVjg'], ['jumping jack', 'F_rq04M0x5M'], ['wall push-up', 'dhjjqFfUVlg'],
  ['push-up', 'WDIpL0pjun0'], ['squat', 'DlS-GAF8Edg'], ['glute bridge', 'SKOMwg1JLrU'],
  ['plank', 'mwlp75MS6Rg'], ['lunge', '-_270H-3Wrc'], ['mountain climber', 'ELCyvGG8RHA'],
  ['burpee', 'qLBImHhCXSw'], ['high knee', 'WofWmk-4qU4'], ['crunch', 'GWIEON0VSaY'],
  ['sit-up', 'zoL7eingzkQ'], ['sit up', 'zoL7eingzkQ'], ['russian twist', 'NrBUdmJSTXk'],
  ['superman', 'z6PJMT2y8GQ'], ['side plank', 'N_s9em1xTqU'], ['wall sit', 'JaZNYM3zAP0'],
  ['calf raise', 'k8ipHzKeAkQ'], ['leg raise', 'S_AK2Qv8_q8'], ['tricep dip', 'Z6clPufyDOs'],
  ['jump rope', 'nMHfZ-yrFjA'], ['skipping', 'nMHfZ-yrFjA'], ['bicep curl', 'XE_pHwbst04'],
  ['shoulder press', '0JfYxMRsUCQ'], ['deadlift', 'Ipi8_vz8_z0'],
  ['march in place', 'QilgMPG7OaA'], ['marching', 'QilgMPG7OaA'],
  ['step-up', 'aajhW7DD1EA'], ['step up', 'aajhW7DD1EA'],
  ['knee raise', 'O_8EUJ7i-PI'], ['brisk walk', 'OMuHf1wQIug'], ['walk', 'OMuHf1wQIug']
];
function findExerciseVideo(term){
  if(!term) return null;
  const t = term.toLowerCase();
  for(const [key, id] of EXERCISE_VIDEO_MAP){
    if(t.includes(key)) return {id, url:'https://www.youtube.com/watch?v='+id};
  }
  return null;
}

/* ---------------- Navigation ---------------- */
function go(view, params){
  detachListeners();
  ROUTE = Object.assign({view}, params||{});
  render();
}

async function render(){
  const app = document.getElementById('app');
  if(!FIREBASE_READY){
    app.innerHTML = `<div class="loading">Firebase Error. Check Config.</div>`;
    return;
  }
  if(ROUTE.view==='landing') renderLanding();
  else if(ROUTE.view==='owner-gate') renderOwnerGate();
  else if(ROUTE.view==='owner-dash') renderOwnerDash();
  else if(ROUTE.view==='owner-change-pw') renderChangePassword();
  else if(ROUTE.view==='owner-form') renderOwnerForm(ROUTE.id||null);
  else if(ROUTE.view==='client-gate') renderClientGate();
  else if(ROUTE.view==='plan-view') renderPlanView(ROUTE.id, ROUTE.asOwner);
}

function renderLanding(){
  document.getElementById('app').innerHTML = `
    <div class="fade-in">
        <div class="hero">
          <div class="hero-inner">
            <div class="gym-name">PRANAL'Z <span class="hl">FITNESS CLUB</span></div>
            <h1>Your Plan. Your Progress.</h1>
            <p>Personalised home workout plans and progress tracking.</p>
          </div>
        </div>
        <div class="doors">
          <div class="door" onclick="go('owner-gate')"><h3>Owner Dashboard</h3><button class="btn btn-primary btn-full">Login</button></div>
          <div class="door" onclick="go('client-gate')"><h3>Member Access</h3><button class="btn btn-outline btn-full">View My Plan</button></div>
        </div>
    </div>
  `;
}

async function renderOwnerGate(){
  const saved = await getOwnerPasscode();
  const firstRun = !saved;
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span></div>
    <div class="card" style="max-width:420px;margin:40px auto;">
      <h2>Owner Login</h2>
      <input id="pc" type="password" placeholder="Passcode">
      <div id="pcErr" class="err"></div>
      <button class="btn btn-primary btn-full" style="margin-top:18px;" onclick="submitPasscode(${firstRun})">Continue</button>
    </div>
  `;
}
async function submitPasscode(firstRun){
  const val = document.getElementById('pc').value.trim();
  if(firstRun){ await db.collection('settings').doc('owner').set({passcode:val}); owner_ok=true; go('owner-dash'); }
  else {
    const saved = await getOwnerPasscode();
    if(saved === val){ owner_ok = true; go('owner-dash'); }
    else document.getElementById('pcErr').textContent='Incorrect';
  }
}

async function renderOwnerDash(){
  if(!owner_ok) return go('owner-gate');
  dashUnsub = watchMembersList(list => paintOwnerDash(list));
}
function paintOwnerDash(index){
  let cardsHtml = index.map(c => `
    <div class="card client-card">
      <button class="delete-x" onclick="deleteClient('${c.id}')">✕</button>
      <div class="tag">${esc(c.goal)}</div>
      <h3>${esc(c.name)}</h3>
      <div class="meta">${esc(c.age)} Yrs · ${esc(c.weight)}</div>
      <div style="font-size:12px; color:${isExpired(c.expiryDate)?'var(--red)':'var(--chalk-dim)'}">Expiry: ${c.expiryDate}</div>
      <div class="row-btns" style="margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="go('plan-view',{id:'${c.id}',asOwner:true})">View</button>
        <button class="btn btn-ghost btn-sm" onclick="go('owner-form',{id:'${c.id}'})">Edit</button>
        <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${c.id}').then(()=>toast('Copied'))">Code</button>
      </div>
    </div>`).join('');
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <span class="brand">OWNER PANEL</span>
      <div style="display:flex;gap:16px;align-items:center;">
        <span class="back" onclick="go('owner-change-pw')">Change Password</span>
        <span class="back" onclick="owner_ok=false;go('landing')">Logout</span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
      <h2>Members (${index.length})</h2>
      <button class="btn btn-primary" onclick="go('owner-form')">+ New Member</button>
    </div>
    <div class="grid-clients">${cardsHtml}</div>
  `;
}
async function deleteClient(id){ if(confirm('Delete?')) await deleteMember(id); }

function renderChangePassword(){
  if(!owner_ok) return go('owner-gate');
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('owner-dash')">← Back</span></div>
    <div class="card" style="max-width:420px;margin:40px auto;">
      <h2>Change Owner Password</h2>
      <label>Current Password</label>
      <input id="cp_old" type="password" placeholder="Current password">
      <label>New Password</label>
      <input id="cp_new" type="password" placeholder="New password">
      <label>Confirm New Password</label>
      <input id="cp_confirm" type="password" placeholder="Re-enter new password">
      <div id="cpErr" class="err"></div>
      <button class="btn btn-primary btn-full" style="margin-top:18px;" onclick="submitChangePassword()">Update Password</button>
    </div>
  `;
}

async function submitChangePassword(){
  const oldVal = document.getElementById('cp_old').value.trim();
  const newVal = document.getElementById('cp_new').value.trim();
  const confirmVal = document.getElementById('cp_confirm').value.trim();
  const errEl = document.getElementById('cpErr');

  const saved = await getOwnerPasscode();
  if(saved !== oldVal){ errEl.textContent = 'Current password is incorrect'; return; }
  if(!newVal){ errEl.textContent = 'New password cannot be empty'; return; }
  if(newVal !== confirmVal){ errEl.textContent = 'New passwords do not match'; return; }
  if(newVal === oldVal){ errEl.textContent = 'New password must be different from current password'; return; }

  await db.collection('settings').doc('owner').set({passcode:newVal});
  toast('Password updated');
  go('owner-dash');
}

async function renderOwnerForm(id){
  let data = id ? await getMember(id) : {name:'', age:'', weight:'', goal:'', totalDays:40, expiryDate:'', phases:[{title:'', exercises:[]},{title:'', exercises:[]},{title:'', exercises:[]},{title:'', exercises:[]}]};
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('owner-dash')">← Cancel</span></div>
    <div class="card">
      <label>Name</label><input id="f_name" value="${esc(data.name)}">
      <div class="two-col">
        <div><label>Age</label><input id="f_age" value="${esc(data.age)}"></div>
        <div><label>Weight</label><input id="f_weight" value="${esc(data.weight)}"></div>
      </div>
      <label>Goal</label><input id="f_goal" value="${esc(data.goal)}">
      <label>Total Days</label><input id="f_total" type="number" value="${data.totalDays||40}">
      <label>Expiry Date</label><input id="f_expiry" type="date" value="${data.expiryDate}">
    </div>
    <div class="section-title"><h2>Workout Phases</h2></div>
    ${[0,1,2,3].map(i => `
      <div class="phase-edit">
        <input id="ph_t_${i}" value="${esc(data.phases[i]?.title||'')}" placeholder="Phase Title">
        <textarea id="ph_e_${i}" style="margin-top:10px" placeholder="Exercises">${(data.phases[i]?.exercises||[]).join('\n')}</textarea>
      </div>`).join('')}
    <button class="btn btn-primary" style="margin-top:20px" onclick="saveClient('${id||''}')">Save Plan</button>
  `;
}

async function saveClient(existingId){
  const id = existingId || genCode();
  const phases = [0,1,2,3].map(i => ({
    title: document.getElementById('ph_t_'+i).value,
    dayStart: (i*10)+1, dayEnd: (i+1)*10,
    exercises: document.getElementById('ph_e_'+i).value.split('\n').filter(Boolean)
  }));
  const data = {
    id, name: document.getElementById('f_name').value, age: document.getElementById('f_age').value,
    weight: document.getElementById('f_weight').value, goal: document.getElementById('f_goal').value,
    totalDays: parseInt(document.getElementById('f_total').value), expiryDate: document.getElementById('f_expiry').value,
    phases, createdAt: Date.now(), doneDays: [], generalRules:['Walk 10k steps', 'Drink 4L water']
  };
  await saveMember(id, data);
  go('owner-dash');
}

function renderClientGate(){
  document.getElementById('app').innerHTML = `
    <div class="topbar"><span class="back" onclick="go('landing')">← Back</span></div>
    <div class="card" style="max-width:400px;margin:40px auto;text-align:center;">
      <h2>Enter Member Code</h2>
      <input id="clientCode" placeholder="Code" style="text-align:center; text-transform:uppercase;">
      <button class="btn btn-primary btn-full" style="margin-top:20px;" onclick="tryClientCode()">View My Plan</button>
    </div>
  `;
}
async function tryClientCode(){
  const code = document.getElementById('clientCode').value.trim().toUpperCase();
  const data = await getMember(code);
  if(data) go('plan-view',{id:code, asOwner:false});
  else toast('Invalid Code');
}

function renderPlanView(id, asOwner){
  planUnsub = watchMember(id, data => paintPlanView(id, asOwner, data));
}

function paintPlanView(id, asOwner, data){
  const app = document.getElementById('app');
  if(!data) return;

  if(!asOwner && isExpired(data.expiryDate)){
    app.innerHTML = `<div style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;"><div class="card" style="max-width:500px;border:2px solid var(--red);"><h1 style="color:var(--red);">Membership Expired</h1><p>Please contact Pranalz Fitness Club to renew.</p><button class="btn btn-primary" onclick="location.reload()">Refresh</button></div></div>`;
    return;
  }

  const doneDays = data.doneDays || [];
  const phasesHtml = data.phases.map((p,i)=>{
    const exHtml = p.exercises.map(e => {
      const matched = findExerciseVideo(exerciseSearchTerm(e));
      return `<li><span>${esc(e)}</span>${matched ? `<a class="ex-watch" href="${matched.url}" target="_blank">▶ Watch</a>` : ''}</li>`;
    }).join('');
    let punchHtml='';
    for(let d=p.dayStart; d<=p.dayEnd; d++) punchHtml += `<div class="punch ${doneDays.includes(d)?'done':''}" onclick="toggleDay('${id}',${d})">${doneDays.includes(d)?'✓':d}</div>`;
    return `<div class="phase"><div class="phase-head" onclick="this.parentElement.classList.toggle('open')"><h3>${esc(p.title)}</h3></div><div class="phase-body"><ul class="ex-list">${exHtml}</ul><div class="punchcard">${punchHtml}</div></div></div>`;
  }).join('');

  app.innerHTML = `
    <div class="topbar"><span class="back" onclick="go('${asOwner?'owner-dash':'landing'}')">← Back</span></div>
    <div class="hero">
      <h1>${esc(data.name)}</h1>
      <p>${esc(data.goal)}</p>
      <div class="stat-grid" style="max-width:480px;margin:20px auto 0;">
        <div class="stat-box"><div class="val">${esc(data.age)}</div><div class="lbl">Age (Years)</div></div>
        <div class="stat-box"><div class="val">${esc(data.weight)}</div><div class="lbl">Weight</div></div>
        <div class="stat-box"><div class="val">${doneDays.length}/${data.totalDays}</div><div class="lbl">Days Done</div></div>
      </div>
      ${asOwner?`<div class="code-box">Member Code: <span class="code">${id}</span></div>`:`<div style="margin-top:10px;color:var(--chalk-dim);font-size:12px;">Valid Until: ${data.expiryDate}</div>`}
    </div>

    <div class="section-title"><div class="num">🏋️</div><h2>Workout Plan</h2></div>
    ${phasesHtml}

    <div class="section-title"><div class="num">🧘</div><h2>Weekly Rest (Active Recovery)</h2></div>
    <div class="card">
      <p style="margin-top:0;color:var(--chalk-dim);">Day 7, Day 14, Day 21, Day 28 & Day 35:</p>
      <ul class="rules-list">
        <li>• 30-minute easy walk</li>
        <li>• Full-body stretching</li>
        <li>• Deep breathing exercises</li>
      </ul>
    </div>

    <div class="section-title"><div class="num">📈</div><h2>Expected Results</h2></div>
    <div class="card">
      <h3 style="color:var(--red);margin:0 0 10px;">(With Regular Workout & Proper Diet)</h3>
      <ul class="rules-list" style="grid-template-columns: 1fr;">
        <li>• Up to 4–7 kg Weight Loss in 40 Days*</li>
        <li>• Improved Stamina</li>
        <li>• Increased Strength & Flexibility</li>
        <li>• Reduced Body Fat</li>
        <li>• Better Energy Levels</li>
      </ul>
      <p style="font-size:11px;color:var(--chalk-dim);margin-top:15px;">*Results vary by individual.</p>
    </div>

    <div class="footer-quote">"Discipline + Consistency = <strong>Transformation.</strong>" 💪</div>
  `;
}

async function toggleDay(id, day){
  const m = await getMember(id); if(!m) return;
  let done = m.doneDays || [];
  if(done.includes(day)) done = done.filter(x => x!==day); else done.push(day);
  await updateMemberProgress(id, done);
}

go('landing');
</script>
</body>
</html>
