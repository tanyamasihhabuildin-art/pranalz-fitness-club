<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pranalz Fitness Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1013;
    --surface:#191B1F;
    --surface-2:#212327;
    --line:#31333A;
    --chalk:#F5F2EA;
    --chalk-dim:#9B978D;
    --red:#FF4B36;
    --red-dim:#3A1712;
    --green:#34D399;
    --gold:#E8B84B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--chalk);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
  }
  .stripes{
    background-image: repeating-linear-gradient(135deg, rgba(255,75,54,0.09) 0px, rgba(255,75,54,0.09) 12px, transparent 12px, transparent 26px);
  }
  h1,h2,h3,.display{
    font-family:'Anton',sans-serif;
    font-weight:400;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--chalk);
  }
  .mono{font-family:'Space Mono',monospace;}
  #app{max-width:1080px;margin:0 auto;padding:20px 16px 60px;}
  .btn{
    font-family:'Work Sans',sans-serif;
    font-weight:700;
    border:none;
    cursor:pointer;
    padding:14px 22px;
    border-radius:10px;
    font-size:15px;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{opacity:0.92;}
  .btn-outline{background:transparent;color:var(--chalk);border:2px solid var(--line);}
  .btn-outline:hover{border-color:var(--red);}
  .btn-ghost{background:var(--surface-2);color:var(--chalk-dim);}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}
  .btn-full{width:100%;}
  input,textarea{
    width:100%;
    background:var(--surface-2);
    border:1.5px solid var(--line);
    color:var(--chalk);
    border-radius:8px;
    padding:12px 14px;
    font-family:'Work Sans',sans-serif;
    font-size:15px;
    outline:none;
  }
  input:focus,textarea:focus{border-color:var(--red);}
  textarea{resize:vertical;min-height:90px;line-height:1.6;}
  label{
    display:block;font-size:13px;font-weight:700;color:var(--chalk-dim);
    text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;margin-top:18px;
  }
  label:first-child{margin-top:0;}
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
  }
  .hero{
    position:relative;text-align:center;padding:56px 20px 40px;border-radius:22px;margin-bottom:26px;
    background:radial-gradient(ellipse at top, #1B1D22 0%, #0F1013 72%);
    border:1px solid var(--line);overflow:hidden;
  }
  .hero:before{
    content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);
    width:520px;height:280px;border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,75,54,0.24) 0%, rgba(255,75,54,0) 70%);

  }
  .hero-inner{position:relative;z-index:1;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:6px;background:var(--red-dim);color:var(--red);
    font-size:11.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
    padding:6px 14px;border-radius:20px;margin-bottom:18px;

  .gym-name{
    font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;

    margin-bottom:14px;color:var(--chalk);

  .gym-name .hl{

  .home-tag{
    display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;
    font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:20px;margin-bottom:10px;

    font-size:12px;color:var(--chalk-dim);cursor:pointer;user-select:none;transition:.12s;

  .punch.done{background:var(--red);border-style:solid;border-color:var(--red);color:#fff;font-weight:700;}
  .punch.rest{border-color:var(--gold);color:var(--gold);}
  .punch:hover{border-color:var(--red);}
  .video-box{
    background:var(--surface-2);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-top:16px;

    position:relative;display:block;width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;

  }

    z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4); opacity:0; transition:opacity .25s ease;

  .form-section{margin-bottom:8px;}
  .phase-edit{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;background:var(--surface-2);}

  }
  .footer-quote strong{color:var(--red);}
  .loading{text-align:center;padding:60px;color:var(--chalk-dim);}
  .err{color:var(--red);font-size:13.5px;margin-top:10px;}
  .help{color:var(--chalk-dim);font-size:12.5px;margin-top:6px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:560px){.two-col{grid-template-columns:1fr;}}
  .delete-x{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--chalk-dim);cursor:pointer;font-size:18px;}
  .delete-x:hover{color:var(--red);}
</style>

<body class="stripes" style="background-attachment:fixed;">
<div id="app"><div class="loading">Loading...</div></div>
<div id="toast" class="toast"></div>

<script>
/* ---------------- State & helpers ---------------- */
let ROUTE = {view:'landing'};
let owner_ok = false;

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
/* Cloud storage (window.storage) is only available when this page runs
   inside a Claude.ai artifact. When the file is opened directly as a
   normal webpage (double-clicked, hosted elsewhere, etc.) that API does
   not exist — so we transparently fall back to the browser's own
   localStorage. This guarantees Save always works instead of failing. */
function hasCloudStorage(){
  return (typeof window!=='undefined') && !!window.storage && typeof window.storage.set==='function';
}
const LS_PREFIX = 'pranalz_';
function lsGet(key){
  try{ const raw = localStorage.getItem(LS_PREFIX+key); return raw!=null ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function lsSet(key, value){
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(value)); return true; }
  catch(e){ console.error('local storage set failed', e); return false; }
}
function lsDelete(key){
  try{ localStorage.removeItem(LS_PREFIX+key); }catch(e){}
}
async function sGet(key, shared){
  if(hasCloudStorage()){
    try{ const r = await window.storage.get(key, !!shared); return r ? JSON.parse(r.value) : null; }
    catch(e){ return lsGet(key); }
  }
  return lsGet(key);
}
async function sSet(key, value, shared){
  if(hasCloudStorage()){
    try{ await window.storage.set(key, JSON.stringify(value), !!shared); return true; }
    catch(e){ console.warn('cloud storage failed, falling back to local', e); }
  }
  return lsSet(key, value);
}
async function sDelete(key, shared){
  if(hasCloudStorage()){
    try{ await window.storage.delete(key, !!shared); return; }catch(e){}
  }
  lsDelete(key);
}
function esc(str){
  const d=document.createElement('div'); d.innerText = str==null?'':str; return d.innerHTML;
}
function linesToArr(text){
  return (text||'').split('\n').map(s=>s.trim()).filter(Boolean);
}
/* Turn one exercise line (e.g. "Bodyweight Squats – 3 × 12") into a clean
   search term (e.g. "Bodyweight Squats") so the video shown for it matches
   that exact exercise, not some unrelated workout. Lines that are just
   round/section headers (e.g. "4 Rounds:") return null — no video needed. */
function exerciseSearchTerm(line){
  if(!line) return null;
  let t = line.trim();
  if(/^\d+\s*rounds?:?$/i.test(t)) return null;
  t = t.replace(/^finish:\s*/i,'');
  t = t.split(/[–-]/)[0].trim();
  t = t.replace(/^\d+\s+/,''); // drop a leading rep count like "20 Squats" -> "Squats"
  if(!t || t.length<3) return null;
  return t;
}
/* Extract a plain YouTube video ID from a watch/share/shorts URL, if
   possible. We deliberately do NOT embed videos in an <iframe> — embedded
   players can get blocked depending on where this page is hosted/viewed.
   Instead we show a real video thumbnail image (a plain <img>, which always
   loads) with a play badge, and open the actual video in a new tab on
   click. This is far more reliable everywhere the app is viewed. */
function extractYouTubeId(url){
  if(!url) return null;
  try{
    const u = new URL(url);
    let id = null;
    if(u.hostname.includes('youtu.be')){
      id = u.pathname.slice(1);
    } else if(u.hostname.includes('youtube.com')){
      if(u.pathname === '/watch') id = u.searchParams.get('v');
      else if(u.pathname.startsWith('/embed/')) id = u.pathname.split('/embed/')[1];
      else if(u.pathname.startsWith('/shorts/')) id = u.pathname.split('/shorts/')[1];
    }
    return id ? id.split('&')[0].split('?')[0] : null;
  }catch(e){ return null; }
}

/* ---------------- Router ---------------- */
function go(view, params){
  ROUTE = Object.assign({view}, params||{});
  render();
}

async function render(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">Loading...</div>';
  if(ROUTE.view==='landing') return renderLanding();
  if(ROUTE.view==='owner-gate') return renderOwnerGate();
  if(ROUTE.view==='owner-dash') return renderOwnerDash();
  if(ROUTE.view==='owner-form') return renderOwnerForm(ROUTE.id||null);
  if(ROUTE.view==='client-gate') return renderClientGate();
  if(ROUTE.view==='plan-view') return renderPlanView(ROUTE.id, ROUTE.asOwner);
}

/* ---------------- Landing ---------------- */
function renderLanding(){
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="gym-name">PRANALZ <span class="hl">FITNESS CLUB</span></div>
        <h1>Your Plan. Your Progress.</h1>
        <p>Personalized diet and home workout plans, private progress tracking, and follow-along videos — all in one place.</p>
        <div class="feature-strip">
          <div class="feature-pill"><span class="em">🎥</span> Home Workout Videos</div>
          <div class="feature-pill"><span class="em">🔒</span> 100% Private Plans</div>
          <div class="feature-pill"><span class="em">📈</span> Daily Progress Tracking</div>
        </div>
      </div>
    </div>
    <div class="doors">
      <div class="door" onclick="go('owner-gate')">

async function submitPasscode(firstRun){
  const val = document.getElementById('pc').value.trim();
  if(!val){ document.getElementById('pcErr').textContent='Passcode cannot be empty.'; return; }
  if(firstRun){
    await sSet('owner-passcode', val, true);

    toast('Passcode set ✅');
    go('owner-dash');
  } else {
    const saved = await sGet('owner-passcode', true);
    if(saved === val){ owner_ok = true; go('owner-dash'); }
    else { document.getElementById('pcErr').textContent='Incorrect passcode. Please try again.'; }

async function copyCode(id){
  let copied = false;
  if(navigator.clipboard && navigator.clipboard.writeText){
    try{ await navigator.clipboard.writeText(id); copied = true; }catch(e){ copied = false; }
  }
  if(!copied){
    try{
      const ta = document.createElement('textarea');
      ta.value = id;
      ta.setAttribute('readonly','');
      ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
      document.body.appendChild(ta);
      ta.focus(); ta.select(); ta.setSelectionRange(0, id.length);
      copied = document.execCommand('copy');
      document.body.removeChild(ta);
    }catch(e){ copied = false; }
  }
  if(copied){ toast('Code copied: '+id+' — share it with the member'); }
  else{ toast('Code: '+id+' — tap the code to select & copy manually'); }
}
function selectCodeText(el){
  try{
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }catch(e){}
}
async function deleteClient(id){
  if(!confirm('Are you sure you want to delete this member?')) return;
  let index = (await sGet('clients-index', true)) || [];
  index = index.filter(c=>c.id!==id);
  await sSet('clients-index', index, true);
  await sDelete('client:'+id, true);
  await sDelete('progress:'+id, true);
  toast('Member deleted');
  renderOwnerDash();
}

async function saveClient(existingId){
  const phases = [];
  for(let i=0;i<4;i++){
    phases.push({
      title: document.getElementById('ph_title_'+i).value.trim(),
      dayStart: parseInt(document.getElementById('ph_start_'+i).value)||0,
      dayEnd: parseInt(document.getElementById('ph_end_'+i).value)||0,
      exercises: linesToArr(document.getElementById('ph_ex_'+i).value),
      video: document.getElementById('ph_video_'+i).value.trim()
    });
  }
  const id = existingId || genCode();
  const data = {
    id,
    name: document.getElementById('f_name').value.trim() || 'New Member',
    age: document.getElementById('f_age').value.trim(),
    weight: document.getElementById('f_weight').value.trim(),
    goal: document.getElementById('f_goal').value.trim(),
    totalDays: parseInt(document.getElementById('f_totaldays').value)||40,
    generalRules: linesToArr(document.getElementById('f_rules').value),
    phases,
    restDays: document.getElementById('f_restdays').value.trim(),
    restActivities: linesToArr(document.getElementById('f_restact').value),
    expectedResults: linesToArr(document.getElementById('f_results').value),
    createdAt: Date.now()
  };
  const ok = await sSet('client:'+id, data, true);
  if(!ok){ toast('Save failed, please try again'); return; }

  let index = (await sGet('clients-index', true)) || [];
  index = index.filter(c=>c.id!==id);
  index.push({id, name:data.name, age:data.age, weight:data.weight, goal:data.goal, totalDays:data.totalDays});
  await sSet('clients-index', index, true);

  if(!existingId){
    await sSet('progress:'+id, {doneDays:[]}, true);
  }
  toast('Plan saved ✅');
  go('plan-view',{id, asOwner:true});
}

/* ---------------- Plan View (shared by owner & client) ---------------- */
async function renderPlanView(id, asOwner){
  const data = await sGet('client:'+id, true);
  if(!data){ toast('Plan not found'); return go(asOwner?'owner-dash':'client-gate'); }
  const prog = (await sGet('progress:'+id, true)) || {doneDays:[]};
  const restDaysArr = (data.restDays||'').split(',').map(s=>parseInt(s.trim())).filter(Boolean);

  const rulesHtml = data.generalRules.map(r=>`<li>${esc(r)}</li>`).join('');
  const resultsHtml = data.expectedResults.map(r=>`<li>${esc(r)}</li>`).join('');
  const restActHtml = data.restActivities.map(r=>`<li>${esc(r)}</li>`).join('');

  const phasesHtml = data.phases.map((p,i)=>{
    const exHtml = p.exercises.map(e=>{
      const term = exerciseSearchTerm(e);
      const watchBtn = term
        ? `<a class="ex-watch" href="${esc('https://www.youtube.com/results?search_query=' + encodeURIComponent(term + ' exercise how to do at home'))}" target="_blank" rel="noopener" title="Watch exactly how to do: ${esc(term)}">▶ Watch</a>`
        : '';
      return `<li><span class="ex-text">${esc(e)}</span>${watchBtn}</li>`;
    }).join('');
    let punchHtml='';
    for(let d=p.dayStart; d<=p.dayEnd; d++){
      const isRest = restDaysArr.includes(d);
      const isDone = prog.doneDays.includes(d);
      punchHtml += `<div class="punch ${isDone?'done':''} ${isRest&&!isDone?'rest':''}" onclick="toggleDay('${id}',${d},${asOwner})" title="Day ${d}">${isDone?'✓':(isRest?'R':d)}</div>`;
    }
    let overviewVideoHtml = '';
    if(p.video){
      const vid = extractYouTubeId(p.video);
      const thumbBlock = vid
        ? `<a class="video-thumb" href="${esc(p.video)}" target="_blank" rel="noopener"><img src="https://img.youtube.com/vi/${vid}/hqdefault.jpg" alt="Workout video thumbnail" loading="lazy"><span class="play-badge">▶</span></a>`
        : `<a class="video-thumb no-thumb" href="${esc(p.video)}" target="_blank" rel="noopener"><span class="play-badge">▶</span></a>`;
      overviewVideoHtml = `
        <div class="video-box">
          <div class="vlabel">🎥 Full phase overview video (optional, added by your trainer)</div>
          ${thumbBlock}
          <a class="video-link" href="${esc(p.video)}" target="_blank" rel="noopener">▶ Watch Full Phase Video</a>
        </div>`;
    }
    return `
      <div class="phase" id="phase_${i}">
        <div class="phase-head" onclick="togglePhase(${i})">
          <div>
            <h3>${esc(p.title)}</h3>
            <div class="sub">Day ${p.dayStart} – ${p.dayEnd}</div>
          </div>
          <div class="arrow">▾</div>
        </div>
        <div class="phase-body">
          <div class="home-tag">🏠 Home Workout — No Gym or Equipment Needed</div>
          <div class="help" style="margin-bottom:6px;">Do these exercises at home, in the exact order listed. Tap "▶ Watch" next to any exercise to see exactly how to do it.</div>
          <ul class="ex-list">${exHtml}</ul>
          ${overviewVideoHtml}
          <label style="margin-top:16px;">Progress Punch Card</label>
          <div class="punchcard">${punchHtml}</div>
          <div class="help">Click a day to mark it done once you've completed that day's home workout.</div>
        </div>
      </div>`;
  }).join('');

  const shareBox = asOwner ? `
    <div class="code-box">
      <div>Member Code: <span class="code" style="cursor:pointer;" title="Tap to select" onclick="selectCodeText(this)">${id}</span></div>
      <button class="btn btn-outline btn-sm" onclick="copyCode('${id}')">Copy</button>
    </div>
    <div class="privacy-note" style="max-width:520px;margin-left:auto;margin-right:auto;"><span class="lock">🔒</span><span>Share this code only with this member. It unlocks only their plan — never another member's.</span></div>` : '';

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <span class="back" onclick="${asOwner? "go('owner-dash')" : "go('landing')"}">← ${asOwner?'Dashboard':'Back'}</span>
      <span class="brand">🏋️ PRANALZ FITNESS CLUB</span>
    </div>

    <div class="hero">
      <div class="logo">${data.totalDays}-DAY HOME WORKOUT PLAN</div>
      <h1>${esc(data.name)}</h1>
      <p>${esc(data.goal)}</p>
      <div class="stat-grid" style="max-width:480px;margin:20px auto 0;">
        <div class="stat-box"><div class="val">${esc(data.age)}</div><div class="lbl">Age (Years)</div></div>
        <div class="stat-box"><div class="val">${esc(data.weight)}</div><div class="lbl">Weight</div></div>
        <div class="stat-box"><div class="val">${prog.doneDays.length}/${data.totalDays}</div><div class="lbl">Days Done</div></div>
      </div>
      ${asOwner ? shareBox : ''}
    </div>

    <div class="section-title"><div class="num">✓</div><h2>General Rules</h2></div>
    <ul class="rules-list">${rulesHtml}</ul>

    <div class="section-title"><div class="num">🏋️</div><h2>Workout Plan &amp; Videos</h2></div>
    ${phasesHtml}

    <div class="section-title"><div class="num">🧘</div><h2>Weekly Rest (Active Recovery)</h2></div>
    <div class="card">
      <p style="margin-top:0;color:var(--chalk-dim);">Days: <strong class="mono" style="color:var(--gold);">${esc(data.restDays)}</strong></p>
      <ul class="rules-list">${restActHtml}</ul>
    </div>

    <div class="section-title"><div class="num">📈</div><h2>Expected Results</h2></div>
    <div class="card"><ul class="rules-list">${resultsHtml}</ul></div>

    <div class="footer-quote">🏋️ PRANALZ FITNESS CLUB<br>"Discipline + Consistency = <strong>Transformation.</strong>" 💪</div>
  `;
  // open first phase by default
  document.getElementById('phase_0').classList.add('open');
}
function togglePhase(i){
  document.getElementById('phase_'+i).classList.toggle('open');
}
async function toggleDay(id, day, asOwner){
  let prog = (await sGet('progress:'+id, true)) || {doneDays:[]};
  const idx = prog.doneDays.indexOf(day);
  if(idx>=0) prog.doneDays.splice(idx,1);
  else prog.doneDays.push(day);
  await sSet('progress:'+id, prog, true);
  renderPlanView(id, asOwner);
}

/* ---------------- Init ---------------- */
render();
</script>
